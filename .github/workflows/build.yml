name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      # ビルド失敗時: エラーをIssueに投稿 (ここから見える)
      - name: Post errors as Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('build.log', 'utf8');
            const lines = log.split('\n');
            const errors = lines.filter(l =>
              /^e:|error:|Unresolved|FAILED|> Task|Cannot|cannot/.test(l)
            ).slice(0, 60).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build failed: ${context.sha.slice(0,7)}`,
              body: `## Build Errors\n\`\`\`\n${errors}\n\`\`\`\n\n[Run](${context.payload.repository.html_url}/actions/runs/${context.runId})`
            });

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wxr-radar-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build summary
        if: success()
        run: |
          SIZE=$(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1)
          echo "## ✅ Build Success — APK: $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts タブから wxr-radar-debug をダウンロード" >> $GITHUB_STEP_SUMMARY
