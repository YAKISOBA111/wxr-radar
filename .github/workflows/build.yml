name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # 手動実行ボタン
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. チェックアウト ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. JDK 17 セットアップ ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle キャッシュ ──
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # ── 4. gradlew に実行権限 ──
      - name: Grant execute permission
        run: chmod +x gradlew

      # ── 5. Debug APK ビルド ──
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 6. APK を Artifact として保存 ──
      #    Actions の画面からダウンロードできる
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wxr-radar-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # 30日間保存

      # ── 7. ビルド情報をサマリーに表示 ──
      - name: Build summary
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "## ✅ Build Success" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| APK | app-debug.apk |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👆 **Artifacts** タブからAPKをダウンロードしてください" >> $GITHUB_STEP_SUMMARY
