name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      # エラーを全て出力 (2>&1でstderrも取得)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      # ビルド失敗時はエラーだけ抽出してサマリーに表示
      - name: Show errors on failure
        if: failure()
        run: |
          echo "## ❌ Build Errors" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^e:|error:|Unresolved|FAILED|> Task|Cannot|cannot" build.log | head -50 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          # コンソールにも出力
          grep -E "^e:|error:|Unresolved|FAILED|> Task|Cannot|cannot" build.log | head -80 || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wxr-radar-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Build summary
        if: success()
        run: |
          SIZE=$(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1)
          echo "## ✅ Build Success" >> $GITHUB_STEP_SUMMARY
          echo "APK size: $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "👆 Artifacts タブから app-debug.apk をDLしてください" >> $GITHUB_STEP_SUMMARY
